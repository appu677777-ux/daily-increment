<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Balance</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>

    <body class="bg-black text-white font-sans">

        <section class="max-w-md mx-auto p-4">
            
            <div class="flex gap-20 mb-2 mx-3./">
                <h1 class="text-lg font-semibold mt-2">Bank balance</h1>
                <button
                onclick="window.location.href='index.html'"
                class="text-white text-3xl pb-2 ml-20">
                ←
            </button>
            </div>
            

            <div class="bg-[#1f1f1f] rounded-2xl p-5 shadow-lg">

                <div class="flex justify-between items-center mb-4">
                    <div>
                        <h2 id="balance" class="text-4xl font-bold">₹1,000</h2>
                    </div>
                </div>

                <div
                    class="flex justify-between items-center text-sm text-gray-300">

                    <div>
                        <p>State Bank of India</p>
                        <p class="text-gray-500">Savings •••• 9093</p>
                    </div>

                    <img
                        src="https://images.seeklogo.com/logo-png/17/2/sbi-logo-png_seeklogo-177051.png"
                        class="w-20 h-10 object-contain bg-white rounded">

                </div>

            </div>

            <div class="mt-6">

                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-lg font-semibold">Transactions</h2>
                    <button class="text-blue-400 text-sm">See all</button>
                </div>

                <div id="historyContainer" class="space-y-3"></div>

            </div>

        </section>

        <script>

document.addEventListener("DOMContentLoaded",function(){

/* ---------------- PIN LOCK ---------------- */

const correctPin="5001"

localStorage.removeItem("siteUnlocked")

function checkPin(){

let pin=document.getElementById("pinInput").value

if(pin===correctPin){

localStorage.setItem("siteUnlocked","true")
document.getElementById("lockScreen").style.display="none"

}else{

alert("Wrong PIN")
location.reload()

}

}

function checkLock(){

let unlocked=localStorage.getItem("siteUnlocked")

if(unlocked==="true"){
document.getElementById("lockScreen").style.display="none"
}

}

/* ---------------- BALANCE ---------------- */

let balance = Number(localStorage.getItem("balance")) || 0
let lastIncrement = localStorage.getItem("lastIncrement")
const DAILY_INCREMENT = 100000

function animateBalance(newBalance){

let el = document.getElementById("balance")
let start = 0
let duration = 500
let startTime = null

function animate(time){

if(!startTime) startTime = time

let progress = time - startTime
let value = Math.min(progress / duration * newBalance, newBalance)

el.innerText = "₹" + Math.floor(value).toLocaleString()

if(progress < duration) requestAnimationFrame(animate)

}

requestAnimationFrame(animate)

}

function updateBalance(){

animateBalance(balance)
localStorage.setItem("balance", balance)

}

/* ---------------- DAILY INCREMENT ---------------- */

function checkDailyIncrement(){

let today = new Date().toDateString()

if(lastIncrement !== today){

balance += DAILY_INCREMENT

localStorage.setItem("lastIncrement", today)
localStorage.setItem("balance", balance)

}

updateBalance()

}

/* ---------------- ADD EXPENSE ---------------- */

function addExpense(){

let amount = Number(document.getElementById("amount").value)
let note = document.getElementById("note").value

if(!amount) return alert("Enter amount")

balance -= amount

let history = JSON.parse(localStorage.getItem("history")) || []

history.push({
amount,
note,
date: new Date().toLocaleString()
})

localStorage.setItem("history", JSON.stringify(history))
localStorage.setItem("balance", balance)

document.getElementById("amount").value=""
document.getElementById("note").value=""

updateBalance()
showHistory()
calculateTodayExpense()

}

/* ---------------- DELETE EXPENSE ---------------- */

function deleteExpense(index){

let history = JSON.parse(localStorage.getItem("history")) || []

balance += history[index].amount

history.splice(index,1)

localStorage.setItem("history",JSON.stringify(history))
localStorage.setItem("balance",balance)

updateBalance()
showHistory()
calculateTodayExpense()

}

/* ---------------- SHOW HISTORY ---------------- */

function showHistory(){

let history = JSON.parse(localStorage.getItem("history")) || []
let container = document.getElementById("historyContainer")

container.innerHTML=""

history.slice().reverse().forEach((item,i)=>{

let div=document.createElement("div")

div.className="flex justify-between items-center bg-[#1a1a1a] p-3 rounded-xl"

div.innerHTML=`

<div class="flex items-center gap-3">

<div class="bg-red-500 w-10 h-10 rounded-full flex items-center justify-center">₹</div>

<div>
<p class="font-medium">${item.note || "Expense"}</p>
<p class="text-gray-400 text-sm">${item.date}</p>
</div>

</div>

<p class="text-red-400 font-semibold">-₹${item.amount}</p>

`

container.appendChild(div)

})

}

/* ---------------- DAILY STATISTICS ---------------- */

function calculateTodayExpense(){

let history = JSON.parse(localStorage.getItem("history")) || []
let today = new Date().toDateString()

let total=0

history.forEach(item=>{
if(new Date(item.date).toDateString()==today){
total+=item.amount
}
})

}

/* ---------------- TIMER ---------------- */

function updateTimer(){

let now=new Date()

let midnight=new Date()
midnight.setHours(24,0,0,0)

let diff=midnight-now

let h=Math.floor(diff/1000/60/60)
let m=Math.floor(diff/1000/60)%60
let s=Math.floor(diff/1000)%60

let timerEl=document.getElementById("timer")
if(timerEl){
timerEl.innerText=
`${h.toString().padStart(2,"0")}:
${m.toString().padStart(2,"0")}:
${s.toString().padStart(2,"0")}`
}

}

setInterval(updateTimer,1000)

checkLock()
checkDailyIncrement()
showHistory()
calculateTodayExpense()
updateTimer()

})

</script>

    </body>
</html>
